 <!DOCTYPE html>
<html>
<head>
<title>MSF Elayadam Unit</title>

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(to right,#0b3d91,#1e90ff);
color:white;
}
.box{
background:white;
color:black;
width:520px;
margin:20px auto;
padding:20px;
border-radius:10px;
}
button,input{
padding:8px;
margin:5px;
width:90%;
}
button{cursor:pointer;}
.hidden{display:none;}

.pending{color:orange;font-weight:bold;}
.approved{color:green;font-weight:bold;}
.rejected{color:red;font-weight:bold;}
.absent{color:red;}
.running{color:green;font-weight:bold;}
</style>

<script>

var members=[
{name:"Muhammed Rifad",mobile:"7511105796"},
{name:"Muhammed Sinan",mobile:"9605105354"}
];

var meetings = JSON.parse(localStorage.getItem("meetings")) || [];

function save(){
localStorage.setItem("meetings",JSON.stringify(meetings));
}

function hideAll(){
document.querySelectorAll(".box").forEach(b=>b.style.display="none");
}

function showHome(){ hideAll(); home.style.display="block"; }
function showAdminLogin(){ hideAll(); adminLoginBox.style.display="block"; }
function showMemberLogin(){ hideAll(); memberLoginBox.style.display="block"; }

/* ---------------- ADMIN ---------------- */

function adminLogin(){
if(adminUser.value==="sinan" && adminPass.value==="4360"){
hideAll();
adminDashboard.style.display="block";
loadAdminDashboard();
}else{
alert("Wrong Login");
}
}

function loadAdminDashboard(){
adminDashContent.innerHTML=
"<button onclick='createMeeting()'>Create New Meeting</button>"+
"<hr><h3>Meeting History</h3>";

meetings.filter(m=>!m.active).forEach(m=>{
adminDashContent.innerHTML+=
"<p><b>Start:</b> "+m.startTime+
"<br><b>End:</b> "+m.endTime+
"<br>"+m.attendance.map(a=>
a.name+" - <span class='"+a.status.toLowerCase()+"'>"+
a.status+"</span>"
).join("<br>")+
"</p><hr>";
});
}

function createMeeting(){

if(meetings.find(m=>m.active)){
alert("Meeting Already Running");
return;
}

meetings.push({
startTime:new Date().toLocaleString(),
endTime:null,
active:true,
attendance:[]
});

save();
hideAll();
adminMeetingPage.style.display="block";
loadAdminMeetingPage();
}

function loadAdminMeetingPage(){

var m=meetings.find(m=>m.active);
if(!m){ showHome(); return; }

adminMeetingContent.innerHTML=
"<p class='running'>Meeting Running</p>"+
"<p>Start Time: "+m.startTime+"</p>"+
"<button onclick='closeMeeting()'>Close Meeting</button>"+
"<hr><h3>Pending Attendance</h3>";

m.attendance.forEach((a,i)=>{
if(a.status==="Pending"){
adminMeetingContent.innerHTML+=
a.name+" - "+a.submitTime+
"<br><button onclick='approve("+i+")'>Approve</button>"+
"<button onclick='reject("+i+")'>Reject</button><hr>";
}
});

adminMeetingContent.innerHTML+="<h3>Approved / Rejected</h3>";

m.attendance.forEach(a=>{
if(a.status!=="Pending"){
adminMeetingContent.innerHTML+=
a.name+" - <span class='"+a.status.toLowerCase()+"'>"+
a.status+"</span><hr>";
}
});
}

function approve(index){
var m=meetings.find(m=>m.active);
m.attendance[index].status="Approved";
m.attendance[index].actionTime=new Date().toLocaleString();
save();
loadAdminMeetingPage();
}

function reject(index){
var m=meetings.find(m=>m.active);
m.attendance[index].status="Rejected";
m.attendance[index].actionTime=new Date().toLocaleString();
save();
loadAdminMeetingPage();
}

function closeMeeting(){
var m=meetings.find(m=>m.active);
if(!m){ return; }

members.forEach(mem=>{
if(!m.attendance.find(a=>a.name===mem.name)){
m.attendance.push({
name:mem.name,
status:"Absent",
submitTime:"-",
actionTime:"-"
});
}
});

m.active=false;
m.endTime=new Date().toLocaleString();
save();

alert("Meeting Closed");
hideAll();
adminDashboard.style.display="block";
loadAdminDashboard();
}

/* ---------------- MEMBER ---------------- */

var currentMember="";

function memberLogin(){
var found=members.find(m=>
m.name.toLowerCase()===memberName.value.toLowerCase() &&
m.mobile===memberMobile.value
);

if(!found){ alert("Invalid Details"); return; }

currentMember=found.name;
hideAll();
memberPanel.style.display="block";
loadMemberPanel();
}

function loadMemberPanel(){
var m=meetings.find(m=>m.active);

memberContent.innerHTML="";

if(m){
memberContent.innerHTML=
"<p class='running'>Meeting Running</p>"+
"<p>Start Time: "+m.startTime+"</p>"+
"<button onclick='submitAttendance()'>Submit Attendance</button>";
}
else{
memberContent.innerHTML="<p>No Active Meeting</p>";
}

memberContent.innerHTML+="<hr><h3>Your History</h3>";

meetings.filter(x=>!x.active).forEach(meet=>{
var record=meet.attendance.find(a=>a.name===currentMember);
memberContent.innerHTML+=
"<p><b>"+meet.startTime+"</b>"+
"<br>Status: "+
(record?
"<span class='"+record.status.toLowerCase()+"'>"+record.status+"</span>"
:"Absent")+
"</p><hr>";
});
}

function submitAttendance(){
var m=meetings.find(m=>m.active);
if(!m){ alert("No Active Meeting"); return; }

if(m.attendance.find(a=>a.name===currentMember)){
alert("Already Submitted");
return;
}

m.attendance.push({
name:currentMember,
status:"Pending",
submitTime:new Date().toLocaleString(),
actionTime:"-"
});

save();
alert("Submitted (Pending Approval)");
loadMemberPanel();
}

window.onload=showHome;

</script>
</head>

<body>

<h1>MSF Elayadam Unit</h1>

<div class="box" id="home">
<button onclick="showAdminLogin()">Admin Login</button>
<button onclick="showMemberLogin()">Member Login</button>
</div>

<div class="box hidden" id="adminLoginBox">
<h2>Admin Login</h2>
<input id="adminUser" placeholder="Username">
<input type="password" id="adminPass" placeholder="Password">
<button onclick="adminLogin()">Login</button>
<button onclick="showHome()">Back</button>
</div>

<div class="box hidden" id="adminDashboard">
<h2>Admin Dashboard</h2>
<div id="adminDashContent"></div>
<button onclick="showHome()">Logout</button>
</div>

<div class="box hidden" id="adminMeetingPage">
<h2>Active Meeting</h2>
<div id="adminMeetingContent"></div>
<button onclick="showHome()">Exit</button>
</div>

<div class="box hidden" id="memberLoginBox">
<h2>Member Login</h2>
<input id="memberName" placeholder="Full Name">
<input id="memberMobile" placeholder="Mobile">
<button onclick="memberLogin()">Login</button>
<button onclick="showHome()">Back</button>
</div>

<div class="box hidden" id="memberPanel">
<h2>Member Panel</h2>
<div id="memberContent"></div>
<button onclick="showHome()">Logout</button>
</div>

</body>
</html>
