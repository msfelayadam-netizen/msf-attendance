 <!DOCTYPE html>
<html>
<head>
<title>MSF Elayadam Unit</title>

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(to right,#0b3d91,#1e90ff);
color:white;
}
.box{
background:white;
color:black;
width:420px;
margin:20px auto;
padding:20px;
border-radius:10px;
}
input,button{
padding:8px;
margin:5px;
width:90%;
}
.present{color:green;font-weight:bold;}
.rejected{color:orange;font-weight:bold;}
.absent{color:red;font-weight:bold;}
</style>

<script>

var members = [
{name:"Muhammed Rifad",mobile:"7511105796"},
{name:"Absham Nousik",mobile:"6282859094"},
{name:"Muhammed Sinan",mobile:"9605105354"},
{name:"Muhammed Jinan",mobile:"8590684348"},
{name:"Member 5",mobile:"5555"},
{name:"Member 6",mobile:"6666"},
{name:"Member 7",mobile:"7777"},
{name:"Member 8",mobile:"8888"},
{name:"Member 9",mobile:"9999"},
{name:"Member 10",mobile:"1010"},
{name:"Member 11",mobile:"1112"},
{name:"Member 12",mobile:"1212"},
{name:"Member 13",mobile:"1313"},
{name:"Member 14",mobile:"1414"}
];

var meetingActive = JSON.parse(localStorage.getItem("meetingActive")) || false;
var meetingDate = localStorage.getItem("meetingDate") || "";
var attendanceStatus = JSON.parse(localStorage.getItem("attendanceStatus")) || {};
var pendingRequests = JSON.parse(localStorage.getItem("pendingRequests")) || [];
var currentMember = "";

function saveData(){
localStorage.setItem("meetingActive", JSON.stringify(meetingActive));
localStorage.setItem("meetingDate", meetingDate);
localStorage.setItem("attendanceStatus", JSON.stringify(attendanceStatus));
localStorage.setItem("pendingRequests", JSON.stringify(pendingRequests));
}

// ADMIN LOGIN
function adminLogin(){
var user=document.getElementById("adminUser").value;
var pass=document.getElementById("adminPass").value;

if(user==="sinan" && pass==="4360"){
document.getElementById("adminLoginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";
document.getElementById("meetingInfo").innerHTML="Active Meeting: "+meetingDate;
loadPending();
showFullStatus();
}else{
alert("Wrong Login");
}
}

// CREATE MEETING
function createMeeting(){
meetingDate=document.getElementById("meetingDate").value;
if(meetingDate===""){ alert("Select date"); return; }

meetingActive=true;
attendanceStatus={};
pendingRequests=[];
saveData();

document.getElementById("meetingInfo").innerHTML="Active Meeting: "+meetingDate;
alert("Meeting Created ✅");
}

// CLOSE MEETING
function closeMeeting(){
meetingActive=false;
saveData();
alert("Meeting Closed ✅");
}

// MEMBER LOGIN
function memberLogin(){

var name=document.getElementById("memberName").value.trim();
var mobile=document.getElementById("memberMobile").value.trim();

var found = members.find(function(m){
return m.name.toLowerCase() === name.toLowerCase()
       && m.mobile === mobile;
});

if(!found){
alert("Invalid Details");
return;
}

currentMember = found.name;
document.getElementById("memberArea").style.display="block";

if(!meetingActive){
document.getElementById("memberStatus").innerHTML =
"<span class='rejected'>No Active Meeting Today</span>";
document.getElementById("submitBtn").style.display="none";
return;
}

checkMemberStatus();
}

// CHECK STATUS INSIDE LOGIN
function checkMemberStatus(){

var status = attendanceStatus[currentMember];

if(status=="Present"){
document.getElementById("memberStatus").innerHTML =
"<span class='present'>You are Present</span>";
document.getElementById("submitBtn").style.display="none";
}
else if(status=="Rejected"){
document.getElementById("memberStatus").innerHTML =
"<span class='rejected'>Your Request Rejected</span>";
document.getElementById("submitBtn").style.display="none";
}
else if(pendingRequests.includes(currentMember)){
document.getElementById("memberStatus").innerHTML =
"<span class='absent'>Waiting for Admin Approval</span>";
document.getElementById("submitBtn").style.display="none";
}
else{
document.getElementById("memberStatus").innerHTML =
"<span class='absent'>Not Submitted</span>";
document.getElementById("submitBtn").style.display="block";
}
}

// SUBMIT ATTENDANCE
function submitAttendance(){
if(!pendingRequests.includes(currentMember)){
pendingRequests.push(currentMember);
saveData();
alert("Attendance Sent to Admin ✅");
}
checkMemberStatus();
}

// ADMIN PENDING LIST
function loadPending(){
var list=document.getElementById("pendingList");
list.innerHTML="";

pendingRequests.forEach(function(name,index){
list.innerHTML+= name+
" <button onclick='accept("+index+")'>Accept</button>"+
" <button onclick='reject("+index+")'>Reject</button><br><br>";
});
}

// ACCEPT
function accept(index){
var name=pendingRequests[index];
attendanceStatus[name]="Present";
pendingRequests.splice(index,1);
saveData();
loadPending();
showFullStatus();
}

// REJECT
function reject(index){
var name=pendingRequests[index];
attendanceStatus[name]="Rejected";
pendingRequests.splice(index,1);
saveData();
loadPending();
showFullStatus();
}

// ADMIN STATUS VIEW
function showFullStatus(){
var result=document.getElementById("adminStatus");
result.innerHTML="<h3>Attendance Status</h3>";

members.forEach(function(member){
if(attendanceStatus[member.name]=="Present"){
result.innerHTML+=member.name+" - <span class='present'>Present</span><br>";
}
else if(attendanceStatus[member.name]=="Rejected"){
result.innerHTML+=member.name+" - <span class='rejected'>Rejected</span><br>";
}
else{
result.innerHTML+=member.name+" - <span class='absent'>Absent</span><br>";
}
});
}

</script>
</head>

<body>

<h1>MSF Elayadam Unit</h1>

<!-- ADMIN LOGIN -->
<div class="box" id="adminLoginBox">
<h2>Admin Login</h2>
<input type="text" id="adminUser" placeholder="Username"><br>
<input type="password" id="adminPass" placeholder="Password"><br>
<button onclick="adminLogin()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="box" id="adminPanel" style="display:none;">
<h2>Admin Panel</h2>

<input type="date" id="meetingDate"><br>
<button onclick="createMeeting()">Create Meeting</button>
<button onclick="closeMeeting()">Close Meeting</button>

<p id="meetingInfo"></p>

<h3>Pending Requests</h3>
<div id="pendingList"></div>

<div id="adminStatus"></div>
</div>

<!-- MEMBER LOGIN -->
<div class="box">
<h2>Member Login</h2>
<input type="text" id="memberName" placeholder="Full Name"><br>
<input type="text" id="memberMobile" placeholder="Mobile Number"><br>
<button onclick="memberLogin()">Login</button>

<div id="memberArea" style="display:none;">
<h3>Status</h3>
<div id="memberStatus"></div>
<button id="submitBtn" onclick="submitAttendance()" style="display:none;">Submit Attendance</button>
</div>

</div>

</body>
</html>
